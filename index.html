<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>나의 뱃지 도감</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<style>
  :root{
    --gold:#D9B26C; --parchment:#F6EFDD;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:'Noto Sans KR', sans-serif;
    background:#FFFFFF;
    color:#262035;
    min-height:100vh;
    overflow-x:hidden;
  }
  #app{ position:relative; min-height:100vh; }

  /* 로그인 화면 */
  .login-screen{
    position:relative; min-height:100vh; display:flex;
    align-items:center; justify-content:center;
    background:#FFFFFF;
    padding:24px;
  }
  .login-card{
    position:relative; z-index:1; width:100%; max-width:380px;
    background:linear-gradient(180deg, var(--parchment), #EFE4C8);
    color:#262035; border-radius:18px; padding:40px 32px 32px; text-align:center;
    box-shadow:0 30px 60px rgba(0,0,0,.18), 0 0 0 1px rgba(217,178,108,.35);
  }
  .login-title{ font-family:'Pretendard', 'Noto Sans KR', sans-serif; font-size:26px; font-weight:700; margin:0 0 10px; }
  .login-desc{ font-size:13px; color:#5B5470; margin:0 0 26px; line-height:1.6; }
  .login-form{ display:flex; flex-direction:column; gap:10px; }
  .login-input{
    font-family:'Noto Sans KR', sans-serif; padding:13px 16px; border-radius:10px;
    border:1.5px solid #D8CBA5; background:#FFFDF6; font-size:14px; outline:none;
    transition:border-color .15s ease;
  }
  .login-input:focus{ border-color:#A98A45; }
  .login-btn{
    font-family:'Noto Sans KR', sans-serif; padding:13px 16px; border-radius:10px; border:none;
    background:#262035; color:var(--parchment); font-weight:700; font-size:14px; cursor:pointer;
    transition:transform .15s ease, background .15s ease;
  }
  .login-btn:hover{ background:#3A3155; transform:translateY(-1px); }
  .login-error{ margin:14px 0 0; font-size:12.5px; color:#B44444; font-weight:500; min-height:16px; }
  .login-note{ margin:20px 0 0; font-size:11px; color:#9C916E; }

  /* 컬렉션 화면 */
  .collection-screen{
    position:relative; min-height:100vh; padding:40px 6vw 80px; display:none;
    background:#b82c40; color:#262035;
  }
  .collection-header{
    position:relative; z-index:1; display:flex; align-items:flex-end; justify-content:flex-end;
    flex-wrap:wrap; gap:16px; margin-bottom:44px; border-bottom:1px solid rgba(217,178,108,.3); padding-bottom:20px;
  }
  .back-link{
    background:transparent; border:1px solid rgba(38,32,53,.25); color:#262035;
    font-family:'Noto Sans KR', sans-serif; font-size:12.5px; padding:9px 16px; border-radius:999px; cursor:pointer;
    transition:background .15s ease, border-color .15s ease;
  }
  .back-link:hover{ background:rgba(38,32,53,.06); border-color:rgba(38,32,53,.45); }
  .collection-body{ position:relative; z-index:1; }

  .empty-state{ text-align:center; padding:90px 20px; color:#6B6480; }
  .empty-mark{ font-size:30px; color:var(--gold); margin-bottom:14px; }
  .empty-text{ font-size:16px; font-weight:500; margin:0 0 8px; color:#262035; }
  .empty-sub{ font-size:13px; color:#847DA0; margin:0; }

  .badge-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:4px; max-width:1200px; }
  .badge-cell{
    position:relative; display:flex; flex-direction:column; align-items:center; cursor:pointer;
    animation:floatIn .6s ease both; width:max-content; justify-self:center;
  }
  @keyframes floatIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  /* 뱃지 클릭 시 살짝 떠올랐다가 아래로 슉 사라지는 전환 애니메이션 */
  .badge-cell.badge-launch{
    animation:badgeLaunchOut .5s cubic-bezier(.5,0,.75,0) forwards;
    pointer-events:none;
  }
  @keyframes badgeLaunchOut{
    0%{ transform:translateY(0) scale(1); opacity:1; }
    28%{ transform:translateY(-16px) scale(1.05); opacity:1; }
    100%{ transform:translateY(220px) scale(.8); opacity:0; }
  }
  .badge-medal{
    position:relative; width:210px; height:210px;
    display:flex; align-items:center; justify-content:center;
    transition:transform .2s ease;
    isolation:isolate; overflow:hidden;
  }
  .badge-medal.placeholder{
    border-radius:50%;
    box-shadow:0 10px 24px rgba(0,0,0,.4), inset 0 0 0 2px rgba(255,255,255,.18);
  }
  .badge-cell:hover .badge-medal{ transform:translateY(-4px); }
  .badge-img{ width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 1px 3px rgba(255,255,255,.55)); }
  .badge-fallback{ font-size:28px; font-weight:700; color:rgba(255,255,255,.85); }
  /* sparkleMap: 흰색(스와이프 반짝임이 적용되는 부분) / 검정(적용 안 되는 부분)을 나타내는 마스크 이미지.
     이 mask로 잘라낸 영역 안에서만 대각선 빛줄기가 스와이프되며 지나갑니다. */
  .badge-sparkle-mask{
    position:absolute; inset:0; width:100%; height:100%; overflow:hidden; pointer-events:none;
    mask-repeat:no-repeat; mask-position:center; mask-size:contain; mask-mode:luminance;
    -webkit-mask-repeat:no-repeat; -webkit-mask-position:center; -webkit-mask-size:contain;
  }
  .badge-sparkle-mask::before{
    content:''; position:absolute; top:-50%; left:-60%; width:40%; height:200%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,.9), transparent);
    transform:rotate(20deg); animation:badgeSweep 3.6s ease-in-out infinite;
  }
  .badge-sparkle-mask.s2::before{ animation-delay:1.8s; }
  @keyframes badgeSweep{
    0%{ left:-60%; opacity:0; }
    8%{ opacity:.95; }
    22%{ left:130%; opacity:0; }
    100%{ left:130%; opacity:0; }
  }

  /* 특별 뱃지: 카드 주변에 은은하게 떠다니는 반짝이 파티클 */
  .badge-particles{
    position:absolute; inset:-6px; pointer-events:none; z-index:1;
  }
  .badge-particle{
    position:absolute; opacity:0;
    animation-name:particleTwinkle; animation-timing-function:ease-in-out; animation-iteration-count:infinite;
  }
  .badge-particle::before{
    content:''; position:absolute; inset:-30%; border-radius:50%;
    background:radial-gradient(circle, rgba(255,251,239,.5) 0%, rgba(217,178,108,.16) 55%, transparent 75%);
    filter:blur(1px);
  }
  .badge-particle::after{
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg, #FFFBEF, var(--gold));
    clip-path:polygon(50% 0%, 62% 38%, 100% 50%, 62% 62%, 50% 100%, 38% 62%, 0% 50%, 38% 38%);
  }
  @keyframes particleTwinkle{
    0%,100%{ opacity:0; transform:scale(.4); }
    50%{ opacity:1; transform:scale(1); }
  }

  .tooltip{
    position:absolute; bottom:100%; right:-10px; margin-bottom:10px;
    background:#0B0E1F; color:#FFFFFF; padding:12px 16px; border-radius:22px;
    min-width:160px; max-width:220px; text-align:left; z-index:5;
    box-shadow:0 12px 24px rgba(0,0,0,.4); pointer-events:none;
    opacity:0; visibility:hidden; transform:scale(.4); transform-origin:bottom right;
  }
  .tooltip.visible{
    visibility:visible;
    animation:tooltipPop .4s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes tooltipPop{
    0%{ opacity:0; transform:scale(.3) translateY(6px); }
    55%{ opacity:1; transform:scale(1.08) translateY(-3px); }
    100%{ opacity:1; transform:scale(1) translateY(0); }
  }
  .tooltip-main{ font-weight:700; font-size:13.5px; margin:0 0 4px; }
  .tooltip-sub{ font-weight:300; font-size:11.5px; line-height:1.5; margin:0; color:#D8D8E4; }
  .tooltip-tail{
    position:absolute; bottom:-6px; left:24px;
    transform:rotate(45deg); border-radius:3px;
    width:12px; height:12px; background:#0B0E1F;
  }

  /* 3D 뷰어 오버레이 */
  .viewer-overlay{
    position:fixed; inset:0; z-index:50; background:rgba(6,8,20,.78);
    backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center;
    animation:fadeIn .2s ease;
  }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .close-btn{
    position:absolute; top:14px; left:14px; z-index:2; width:36px; height:36px; border-radius:50%;
    border:1px solid rgba(245,243,236,.35); background:rgba(255,255,255,.08); color:#F5F3EC;
    font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background .15s ease, transform .15s ease;
  }
  .close-btn:hover{ background:rgba(255,255,255,.18); transform:scale(1.06); }
  /* 쿠션(패널)과 그 아래 음량 슬라이더를 함께 세로로 쌓아서 가운데 정렬 */
  .viewer-stack{ display:flex; flex-direction:column; align-items:center; gap:14px; }
  .viewer-panel{
    position:relative;
    width:min(468px, 92vw);
    background:
      radial-gradient(120% 85% at 30% 18%, rgba(255,255,255,.14), transparent 55%),
      linear-gradient(165deg, #232a52, #14172c);
    border-radius:42px;
    padding:28px 24px 24px;
    box-shadow:
      0 30px 80px rgba(0,0,0,.55),
      0 0 0 1px rgba(217,178,108,.2),
      inset 0 3px 6px rgba(255,255,255,.16),
      inset 0 -18px 30px rgba(0,0,0,.45),
      inset 16px 0 26px rgba(0,0,0,.22),
      inset -16px 0 26px rgba(0,0,0,.22);
    text-align:center;
    animation:panelAppear .3s ease-out backwards;
  }
  @keyframes panelAppear{
    0%{ opacity:0; transform:scale(.92); }
    100%{ opacity:1; transform:scale(1); }
  }
  /* 낙하/착지 바운스와 배경이 받아내는 반응은 CSS 키프레임이 아니라
     mountThree()의 스프링 물리 시뮬레이션(JS, requestAnimationFrame)이 매 프레임 직접 계산합니다.
     두 요소가 같은 타임라인에서 갱신되므로 타이밍이 항상 정확히 맞습니다. */
  /* 3D 모델이 담기는 무대: 십자 형태의 음영을 여기 고정해서 넣어 쿠션이 눌린 듯한 입체감을 주되,
     낙하/바운스로 움직이는 건 안쪽 .viewer-canvas(#viewerCanvas)뿐이라 배경은 함께 튀지 않습니다. */
  .viewer-canvas-stage{
    position:relative; border-radius:26px; overflow:hidden;
    background:
      radial-gradient(ellipse 92% 15% at 50% 50%, rgba(0,0,0,.28), transparent 72%),
      radial-gradient(ellipse 15% 92% at 50% 50%, rgba(0,0,0,.28), transparent 72%),
      radial-gradient(circle at 50% 50%, rgba(0,0,0,.4), transparent 62%);
  }
  .viewer-canvas{ width:100%; height:min(360px, 64vw); touch-action:none; cursor:grab; }
  .viewer-canvas:active{ cursor:grabbing; }
  /* 뱃지 설명: 금색 명찰이 쿠션을 누르고 박혀있는 느낌 */
  .viewer-caption{
    position:relative; margin-top:18px; border-radius:11px; padding:13px 18px;
    background:linear-gradient(165deg, #F6E7B8, #D9B26C 55%, #B8933F);
    box-shadow:
      0 0 0 7px rgba(0,0,0,.16),
      0 2px 5px rgba(0,0,0,.28),
      inset 0 6px 7px -4px rgba(0,0,0,.35),
      inset 0 1px 0 rgba(255,255,255,.6),
      inset 0 -2px 4px rgba(0,0,0,.2);
    border:1px solid rgba(120,90,30,.5);
  }
  .viewer-name{ font-weight:700; font-size:16px; margin:0 0 5px; color:#3B2B10; text-shadow:0 1px 0 rgba(255,255,255,.4); }
  .viewer-desc{ font-weight:500; font-size:12.5px; color:#4A3716; margin:0; line-height:1.5; }
  .viewer-volume{ display:flex; align-items:center; justify-content:center; gap:7px; }
  .viewer-volume-icon{ font-size:11px; opacity:.75; color:#F5F3EC; }
  .viewer-volume-slider{
    -webkit-appearance:none; appearance:none;
    width:84px; height:3px; border-radius:999px;
    background:rgba(245,243,236,.22); outline:none; cursor:pointer;
  }
  .viewer-volume-slider::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none;
    width:10px; height:10px; border-radius:50%;
    background:var(--gold); cursor:pointer; border:none;
  }
  .viewer-volume-slider::-moz-range-thumb{
    width:10px; height:10px; border-radius:50%;
    background:var(--gold); cursor:pointer; border:none;
  }
  .viewer-volume-slider::-moz-range-track{
    height:3px; border-radius:999px; background:rgba(245,243,236,.22);
  }
</style>
</head>
<body>
<div id="app">

  <!-- 로그인 화면 -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1 class="login-title">나의 뱃지 도감</h1>
      <p class="login-desc">이름을 입력하면 그동안 모은 뱃지를 볼 수 있어요.</p>
      <form class="login-form" id="loginForm">
        <input type="text" class="login-input" id="nameInput" placeholder="이름을 입력하세요" />
        <button type="submit" class="login-btn">도감 열기</button>
      </form>
      <p class="login-error" id="loginError"></p>
      <p class="login-note">테스트용 등록 이름: 김민준 · 이서연 · 박도윤</p>
    </div>
  </div>

  <!-- 컬렉션 화면 -->
  <div class="collection-screen" id="collectionScreen">
    <header class="collection-header">
      <button class="back-link" id="backBtn">로그인 창으로</button>
    </header>
    <main class="collection-body">
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-mark">✦</div>
        <p class="empty-text">아직 아무런 뱃지도 모으지 못했어요.</p>
        <p class="empty-sub">스터디에 참여하면 새로운 뱃지가 도감에 나타나요.</p>
      </div>
      <div class="badge-grid" id="badgeGrid"></div>
    </main>
  </div>

  <!-- 3D 뷰어 오버레이 -->
  <div class="viewer-overlay" id="viewerOverlay">
    <div class="viewer-stack">
      <div class="viewer-panel">
        <button class="close-btn" id="closeViewerBtn" aria-label="닫기">✕</button>
        <div class="viewer-canvas-stage">
          <div class="viewer-canvas" id="viewerCanvas"></div>
        </div>
        <div class="viewer-caption">
          <p class="viewer-name" id="viewerName"></p>
          <p class="viewer-desc" id="viewerDesc"></p>
        </div>
      </div>
      <div class="viewer-volume">
        <span class="viewer-volume-icon" aria-hidden="true">🔈</span>
        <input type="range" id="volumeSlider" class="viewer-volume-slider" min="0" max="100" value="70" aria-label="효과음 볼륨" />
      </div>
    </div>
  </div>

</div>

<script>
/* ----------------------------------------------------------------
   뱃지 카탈로그 + 유저별 보유 목록
   실제 서비스에서는 이 부분을 원하는 뱃지·이름으로 편집하면 됩니다.

   1) BADGE_CATALOG : 뱃지 하나의 "정의"를 id별로 한 번만 기입합니다.
        name / desc  : 말풍선에 표시될 이름과 설명
        colors       : [메인색, 보조색]
        shape        : 3D 자리표시자 모양 (cylinder/torus/icosahedron/octahedron),
                       modelUrl이 없거나 로드에 실패했을 때 사용됩니다.
        image        : 실제 2D 썸네일 이미지 URL (없으면 도형 자리표시자)
        sparkleMap1  : 스와이프 반짝임 적용 영역 마스크(흰색=적용/검정=비적용) URL 1
        sparkleMap2  : 스와이프 반짝임 적용 영역 마스크(흰색=적용/검정=비적용) URL 2
        modelUrl     : 실제 .glb 3D 모델 URL (없으면 도형 자리표시자)
        sound        : 3D 뷰어에서 뱃지를 클릭했을 때 재생할 효과음 URL (없으면 무음).
                       UI에는 노출되지 않는, 뱃지 정보에만 기록해두는 내부 데이터입니다.
        type         : 뱃지 유형. "basic"(기본, 기본값) | "special"(특별).
                       special 뱃지는 2D 카드와 3D 뷰어 모두에서 은은하게 반짝이는
                       파티클 효과가 추가로 나타납니다. 필드를 생략하면 basic으로 처리됩니다.

   2) REGISTERED_USERS : 유저 이름 -> 보유한 뱃지 id 배열.
      뱃지 내용을 바꾸고 싶으면 BADGE_CATALOG만 수정하면 되고,
      유저에게 뱃지를 주고 싶으면 여기에 id만 추가하면 됩니다.
------------------------------------------------------------------- */
const BADGE_CATALOG = {
  b5: {
    name:"새싹 뱃지",
    desc:"천리길도 한걸음부터, 스터디에 처음 참여하면 얻을 수 있는 뱃지입니다.",
    colors:["#D9B26C","#F4E3B2"],
    shape:"cylinder",
    image:"assets/images/001-starter.png",
    sparkleMap1:"assets/sparkle-maps/001-starter-sparkle-1.png",
    sparkleMap2:"assets/sparkle-maps/001-starter-sparkle-2.png",
    modelUrl:"assets/models/001-starter.glb",
    sound:"assets/sounds/001-starter.mp3"
  },
  b6: {
    name:"겨울오로라 뱃지",
    desc:"2025 겨울방학 스터디를 진행하여 얻은 뱃지입니다.",
    type:"special",
    colors:["#D9B26C","#F4E3B2"],
    shape:"cylinder",
    image:"assets/images/002-winterstd.png",
    sparkleMap1:"assets/sparkle-maps/002-winterstd-sparkle-1.png",
    sparkleMap2:"assets/sparkle-maps/002-winterstd-sparkle-2.png",
    modelUrl:"assets/models/002-winterstd.glb",
    sound:"assets/sounds/002-winterstd.mp3"
  },
  b7: {
    name:"ASTERISK",
    desc:"2026 디자인 X를 성공적으로 마무리하여 얻은 뱃지입니다.",
    type:"special",
    colors:["#D9B26C","#F4E3B2"],
    shape:"cylinder",
    image:"assets/images/003-designx.png",
    sparkleMap1:"assets/sparkle-maps/003-designx-sparkle-1.png",
    sparkleMap2:"assets/sparkle-maps/003-designx-sparkle-2.png",
    modelUrl:"assets/models/003-designx.glb",
    sound:"assets/sounds/003-designx.mp3"
  }
};

const REGISTERED_USERS = {
  "김민준": ["b5", "b6", "b7"],
  "이서연": [],
  "박도윤": []
};

function getUserBadges(name){
  const ids = REGISTERED_USERS[name] || [];
  return ids
    .map(id => BADGE_CATALOG[id] ? Object.assign({ id }, BADGE_CATALOG[id]) : null)
    .filter(Boolean);
}

const SHAPE_LABEL = { cylinder:"메", icosahedron:"보", octahedron:"각", torus:"고" };

// 특별(special) 뱃지 카드 주변에 흩뿌릴 파티클의 고정 배치(퍼센트 좌표는 .badge-particles 기준).
const PARTICLE_LAYOUT = [
  { top:'6%',  left:'16%', size:13, delay:'0s',   duration:'1.1s' },
  { top:'18%', left:'86%', size:11, delay:'.2s',  duration:'.9s'  },
  { top:'48%', left:'4%',  size:15, delay:'.4s',  duration:'1.2s' },
  { top:'78%', left:'12%', size:11, delay:'.6s',  duration:'1.0s' },

/* ---------------- 화면 전환 ---------------- */
const loginScreen = document.getElementById('loginScreen');
const collectionScreen = document.getElementById('collectionScreen');
const loginForm = document.getElementById('loginForm');
const nameInput = document.getElementById('nameInput');
const loginError = document.getElementById('loginError');
const badgeGrid = document.getElementById('badgeGrid');
const emptyState = document.getElementById('emptyState');
const backBtn = document.getElementById('backBtn');

function showCollection(name){
  const badges = getUserBadges(name);
  badgeGrid.innerHTML = '';
  if(badges.length === 0){
    emptyState.style.display = 'block';
    badgeGrid.style.display = 'none';
  }else{
    emptyState.style.display = 'none';
    badgeGrid.style.display = 'grid';
    badges.forEach((b, i) => badgeGrid.appendChild(renderBadgeCell(b, i)));
  }
  loginScreen.style.display = 'none';
  collectionScreen.style.display = 'block';
}

function showLogin(){
  collectionScreen.style.display = 'none';
  loginScreen.style.display = 'flex';
  nameInput.value = '';
  loginError.textContent = '';
  nameInput.focus();
}

loginForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const trimmed = nameInput.value.trim();
  if(!trimmed){
    loginError.textContent = '이름을 입력해 주세요.';
    return;
  }
  if(!(trimmed in REGISTERED_USERS)){
    loginError.textContent = '등록되지 않은 이름이에요. 스터디장에게 등록을 요청해 주세요.';
    return;
  }
  loginError.textContent = '';
  showCollection(trimmed);
});

backBtn.addEventListener('click', showLogin);

/* ---------------- 뱃지 셀 렌더링 ---------------- */
function renderBadgeCell(badge, index){
  const cell = document.createElement('div');
  cell.className = 'badge-cell';
  cell.style.animationDelay = ((index % 6) * 0.35) + 's';

  const medal = document.createElement('div');

  if(badge.image){
    medal.className = 'badge-medal';
    const img = document.createElement('img');
    img.src = badge.image; img.alt = badge.name; img.className = 'badge-img';
    medal.appendChild(img);

    [badge.sparkleMap1, badge.sparkleMap2].forEach((url, i) => {
      if(!url) return;
      const sparkle = document.createElement('div');
      sparkle.className = `badge-sparkle-mask s${i + 1}`;
      sparkle.style.maskImage = `url("${url}")`;
      sparkle.style.webkitMaskImage = `url("${url}")`;
      medal.appendChild(sparkle);
    });
  }else{
    medal.className = 'badge-medal placeholder';
    medal.style.background = `linear-gradient(155deg, ${badge.colors[0]}, ${badge.colors[1]})`;
    const span = document.createElement('span');
    span.className = 'badge-fallback';
    span.textContent = SHAPE_LABEL[badge.shape] || '★';
    medal.appendChild(span);
  }
  cell.appendChild(medal);

  if(badge.type === 'special'){
    const particles = document.createElement('div');
    particles.className = 'badge-particles';
    PARTICLE_LAYOUT.forEach((p) => {
      const dot = document.createElement('span');
      dot.className = 'badge-particle';
      dot.style.top = p.top; dot.style.left = p.left;
      dot.style.width = dot.style.height = p.size + 'px';
      dot.style.animationDelay = p.delay;
      dot.style.animationDuration = p.duration;
      particles.appendChild(dot);
    });
    cell.appendChild(particles);
  }

  const tooltip = document.createElement('div');
  tooltip.className = 'tooltip';
  tooltip.innerHTML = `
    <p class="tooltip-main">${escapeHtml(badge.name)}</p>
    <p class="tooltip-sub">${escapeHtml(badge.desc)}</p>
    <span class="tooltip-tail"></span>
  `;
  cell.appendChild(tooltip);

  cell.addEventListener('mouseenter', () => {
    tooltip.classList.remove('visible');
    void tooltip.offsetWidth; // 재진입 시 팝 애니메이션이 다시 재생되도록 강제 리플로우
    tooltip.classList.add('visible');
  });
  cell.addEventListener('mouseleave', () => { tooltip.classList.remove('visible'); });
  cell.addEventListener('click', () => launchViewer(cell, badge));

  return cell;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ---------------- 3D 뷰어 ---------------- */
const viewerOverlay = document.getElementById('viewerOverlay');
const viewerCanvasHost = document.getElementById('viewerCanvas');
const viewerName = document.getElementById('viewerName');
const viewerDesc = document.getElementById('viewerDesc');
const closeViewerBtn = document.getElementById('closeViewerBtn');
const volumeSlider = document.getElementById('volumeSlider');

let threeCleanup = null;
let launchedCell = null;
let isLaunching = false;
let badgeSoundVolume = Number(volumeSlider.value) / 100;
volumeSlider.addEventListener('input', () => {
  badgeSoundVolume = Number(volumeSlider.value) / 100;
});

function launchViewer(cell, badge){
  if(isLaunching) return;
  isLaunching = true;
  launchedCell = cell;
  cell.style.animationDelay = '0s'; // 진입 애니메이션의 stagger 지연이 남아있으면 퇴장 애니메이션도 늦게 시작됨
  cell.classList.add('badge-launch');
  cell.addEventListener('animationend', () => openViewer(badge), { once:true });
}

function playBadgeSound(url){
  try{
    const audio = new Audio(url);
    audio.volume = badgeSoundVolume;
    audio.play().catch(() => {});
    return audio;
  }catch(err){
    console.error('뱃지 효과음 재생 실패', err);
    return null;
  }
}

function openViewer(badge){
  viewerName.textContent = badge.name;
  viewerDesc.textContent = badge.desc;
  viewerOverlay.style.display = 'flex';
  mountThree(badge);
}

function closeViewer(){
  viewerOverlay.style.display = 'none';
  if(threeCleanup){ threeCleanup(); threeCleanup = null; }
  viewerCanvasHost.innerHTML = '';
  if(launchedCell){ launchedCell.classList.remove('badge-launch'); launchedCell = null; }
  isLaunching = false;
}
closeViewerBtn.addEventListener('click', closeViewer);

// 특별(special) 뱃지의 3D 파티클용 은은한 광점 텍스처(4개의 침이 있는 반짝임 별 모양).
// 뷰어를 열 때마다 새로 만들지 않고 재사용합니다.
let sparkleTexture = null;
function getSparkleTexture(){
  if(sparkleTexture) return sparkleTexture;
  const size = 64;
  const cx = size / 2, cy = size / 2;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');

  // 4개의 뾰족한 침을 가진 별 모양 경로 (바깥/안쪽 반지름을 번갈아 찍어 만든 8각 별)
  const outerR = size * 0.42, innerR = size * 0.11;
  ctx.beginPath();
  for(let i = 0; i < 8; i++){
    const angle = (Math.PI / 4) * i - Math.PI / 2;
    const r = i % 2 === 0 ? outerR : innerR;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();

  const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, outerR);
  gradient.addColorStop(0, 'rgba(255,255,255,1)');
  gradient.addColorStop(0.5, 'rgba(255,240,200,.95)');
  gradient.addColorStop(1, 'rgba(217,178,108,.06)');
  ctx.shadowColor = 'rgba(255,240,200,.45)';
  ctx.shadowBlur = size * 0.05;
  ctx.fillStyle = gradient;
  ctx.fill();

  sparkleTexture = new THREE.CanvasTexture(canvas);
  return sparkleTexture;
}

function mountThree(badge){
  const mount = viewerCanvasHost;
  const width = mount.clientWidth || 320;
  const height = mount.clientHeight || 320;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(40, width/height, 0.1, 100);
  camera.position.set(0,0,4.0);

  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputEncoding = THREE.sRGBEncoding;
  mount.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 1.1));
  const key = new THREE.DirectionalLight(0xffffff, 1.2);
  key.position.set(2,3,4); scene.add(key);
  const fill = new THREE.DirectionalLight(0xffffff, 0.7);
  fill.position.set(-3,-1,3); scene.add(fill);
  const rimLight = new THREE.DirectionalLight(0xffffff, 0.5);
  rimLight.position.set(0,2,-4); scene.add(rimLight);
  // 뱃지 색상이 아닌 중립광으로: 모델에 포함된 머티리얼 색이 그대로 보이도록 색을 입히지 않습니다.
  const glowLight = new THREE.PointLight(0xffffff, 1.4, 10);
  glowLight.position.set(-2,1,2); scene.add(glowLight);

  // 실제 모델이든 자리표시자 도형이든 이 pivot을 회전시켜 조작합니다.
  const pivot = new THREE.Group();
  scene.add(pivot);
  const disposables = [];
  let mixer = null;
  let clipActions = [];

  // 특별(special) 뱃지 주변을 은은하게 떠다니는 반짝이 파티클 (공유 텍스처를 사용하므로 dispose 대상에서 제외)
  const sparkleGroup = new THREE.Group();
  scene.add(sparkleGroup);
  const sparkles = [];
  if(badge.type === 'special'){
    const texture = getSparkleTexture();
    const SPARKLE_COUNT = 14;
    for(let i = 0; i < SPARKLE_COUNT; i++){
      const material = new THREE.SpriteMaterial({
        map: texture, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
      });
      const sprite = new THREE.Sprite(material);
      const radius = 1.5 + Math.random() * 0.7;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos((Math.random() * 2) - 1);
      sprite.position.set(
        radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi) * 0.7,
        radius * Math.sin(phi) * Math.sin(theta)
      );
      const baseScale = 0.09 + Math.random() * 0.1;
      sprite.userData.baseScale = baseScale;
      sprite.userData.phase = Math.random() * Math.PI * 2;
      sprite.userData.speed = 3.5 + Math.random() * 3;
      sprite.scale.setScalar(baseScale);
      sparkleGroup.add(sprite);
      sparkles.push(sprite);
      disposables.push(material);
    }
  }

  function buildPlaceholder(){
    let geometry;
    switch(badge.shape){
      case 'torus': geometry = new THREE.TorusGeometry(0.85, 0.32, 24, 80); break;
      case 'icosahedron': geometry = new THREE.IcosahedronGeometry(1.05, 0); break;
      case 'octahedron': geometry = new THREE.OctahedronGeometry(1.1, 0); break;
      default: geometry = new THREE.CylinderGeometry(1,1,0.28,48);
    }
    const material = new THREE.MeshStandardMaterial({
      color: badge.colors[0], metalness:0.75, roughness:0.22,
      emissive: new THREE.Color(badge.colors[0]), emissiveIntensity:0.12
    });
    const mesh = new THREE.Mesh(geometry, material);
    pivot.add(mesh);
    disposables.push(geometry, material);

    if(badge.shape === 'cylinder'){
      const rimGeo = new THREE.TorusGeometry(1.02, 0.05, 16, 64);
      const rimMat = new THREE.MeshStandardMaterial({ color: badge.colors[1], metalness:0.8, roughness:0.15 });
      const rim = new THREE.Mesh(rimGeo, rimMat);
      rim.rotation.x = Math.PI/2;
      pivot.add(rim);
      disposables.push(rimGeo, rimMat);
    }
  }

  if(badge.modelUrl){
    const loader = new THREE.GLTFLoader();
    loader.load(
      badge.modelUrl,
      (gltf) => {
        const modelRoot = gltf.scene;
        // 모델 크기가 제각각이어도 뷰어 안에 일정하게 들어오도록 정규화합니다.
        const box = new THREE.Box3().setFromObject(modelRoot);
        const size = new THREE.Vector3(); box.getSize(size);
        const center = new THREE.Vector3(); box.getCenter(center);
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const scale = 2.4 / maxDim;
        modelRoot.scale.setScalar(scale);
        modelRoot.position.sub(center.multiplyScalar(scale));
        pivot.add(modelRoot);

        // glb에 애니메이션 클립이 있으면 재생 준비만 해두고, 실제 재생은 뱃지 클릭 시 트리거합니다.
        if(gltf.animations && gltf.animations.length){
          mixer = new THREE.AnimationMixer(modelRoot);
          clipActions = gltf.animations.map((clip) => {
            const action = mixer.clipAction(clip);
            action.setLoop(THREE.LoopOnce, 1);
            action.clampWhenFinished = true;
            return action;
          });
        }
      },
      undefined,
      (err) => {
        console.error('glb 모델 로드 실패, 자리표시자 도형으로 대체합니다.', err);
        buildPlaceholder();
      }
    );
  } else {
    buildPlaceholder();
  }

  // glb 모델은 정면을 바라보도록 시작하고, 도형 자리표시자는 보기 좋은 각도로 시작합니다.
  const initialTilt = badge.modelUrl ? { rotX:0, rotY:0 } : { rotX:0.35, rotY:0.6 };
  const state = {
    dragging:false, lastX:0, lastY:0,
    rotX:initialTilt.rotX, rotY:initialTilt.rotY,
    velX:0, velY:0
  };
  let raf;
  const MOMENTUM_DAMPING = 0.94;
  const MOMENTUM_STOP_THRESHOLD = 0.0003;

  /* ---- 낙하 + 착지 스프링 물리 ----
     뱃지 캔버스(mount)와 배경 패널(panelEl)을 CSS 키프레임 대신 같은 rAF 루프 안에서
     매 프레임 함께 계산해서, 착지하는 정확한 순간에 배경이 반응하도록 동기화합니다. */
  const panelEl = mount.closest('.viewer-panel');
  const DROP_START_Y = -300;
  const DROP_DELAY = 0.28; // 배경 패널이 먼저 자리를 잡은 뒤 뱃지가 떨어지기 시작
  const CLICK_BOUNCE_KICK = 340; // 뱃지 클릭(사운드 재생) 시 "뽀용"하고 튀는 정도
  const drop = { y:DROP_START_Y, vel:0, elapsed:0, started:false };
  const panelSquash = { v:0, vel:0, triggered:false };
  let lastFrameTime = null;

  mount.style.opacity = '0';
  mount.style.transformOrigin = 'bottom center';
  mount.style.transform = `translateY(${DROP_START_Y}px)`;
  if(panelEl) panelEl.style.transform = '';

  function stepSpring(s, dt, k, c){
    const accel = -k * s.v - c * s.vel;
    s.vel += accel * dt;
    s.v += s.vel * dt;
  }

  function updateDropPhysics(dt){
    // 낙하 위치 스프링 (뱃지가 떨어지다 바닥에서 통통 튕기며 안정됨)
    const k = 170, c = 12;
    const accel = -k * drop.y - c * drop.vel;
    drop.vel += accel * dt;
    const prevY = drop.y;
    drop.y += drop.vel * dt;

    // 처음으로 바닥(y=0)을 지나는 순간 = 착지. 배경에 "받아내는" 반응 스프링을 걸어줍니다.
    if(!panelSquash.triggered && prevY < 0 && drop.y >= 0){
      panelSquash.triggered = true;
      panelSquash.vel += 6.5;
    }
    stepSpring(panelSquash, dt, 480, 18);

    // 속도에서 직접 유도한 스쿼시&스트레치: 빠르게 움직일수록 진행 방향으로 길쭉해집니다.
    const stretch = Math.max(0, Math.min(0.32, Math.abs(drop.vel) * 0.00042));
    const scaleY = (1 + stretch).toFixed(3);
    const scaleX = (1 - stretch * 0.6).toFixed(3);
    mount.style.opacity = '1';
    mount.style.transform = `translateY(${drop.y.toFixed(2)}px) scale(${scaleX}, ${scaleY})`;

    if(panelEl){
      const pDelta = Math.max(-0.05, Math.min(0.05, panelSquash.v * 0.014));
      panelEl.style.transform = `scale(${(1 + pDelta).toFixed(3)}, ${(1 - pDelta).toFixed(3)})`;
    }
  }

  function render(now){
    if(!state.dragging && (Math.abs(state.velX) > MOMENTUM_STOP_THRESHOLD || Math.abs(state.velY) > MOMENTUM_STOP_THRESHOLD)){
      state.rotY += state.velY;
      state.rotX += state.velX;
      state.rotX = Math.max(-1.1, Math.min(1.1, state.rotX));
      state.velY *= MOMENTUM_DAMPING;
      state.velX *= MOMENTUM_DAMPING;
    }
    pivot.rotation.y = state.rotY;
    pivot.rotation.x = state.rotX;

    if(lastFrameTime === null) lastFrameTime = now;
    const frameDt = Math.min(0.032, (now - lastFrameTime) / 1000);
    lastFrameTime = now;
    drop.elapsed += frameDt;
    if(drop.elapsed >= DROP_DELAY){
      updateDropPhysics(drop.started ? frameDt : 0);
      drop.started = true;
    }
    if(mixer) mixer.update(frameDt);

    if(sparkles.length){
      const t = now * 0.001;
      sparkleGroup.rotation.y += frameDt * 0.15;
      sparkles.forEach((sprite) => {
        const tw = 0.5 + 0.5 * Math.sin(t * sprite.userData.speed + sprite.userData.phase);
        sprite.material.opacity = 0.25 + tw * 0.75;
        sprite.scale.setScalar(sprite.userData.baseScale * (0.7 + tw * 0.5));
      });
    }

    renderer.render(scene, camera);
    raf = requestAnimationFrame(render);
  }
  render(performance.now());

  // 뱃지를 클릭(드래그 아님)했을 때만 효과음을 재생하기 위한 레이캐스팅
  const raycaster = new THREE.Raycaster();
  let clickStart = null;
  let canClickBadge = true; // 사운드가 다 재생될 때까지 재클릭으로 다시 재생하지 못하도록 막는 쿨다운
  const CLICK_COOLDOWN_FALLBACK = 900; // 사운드가 없거나 길이를 알 수 없을 때의 기본 대기시간(ms)
  const CLICK_COOLDOWN_SAFETY = 6000; // 'ended' 이벤트가 오지 않는 예외 상황을 대비한 최대 대기시간(ms)

  function handleBadgeClick(e){
    if(!canClickBadge) return;
    if(!badge.sound && !clipActions.length) return;
    const rect = el.getBoundingClientRect();
    const ndc = new THREE.Vector2(
      ((e.clientX - rect.left) / rect.width) * 2 - 1,
      -((e.clientY - rect.top) / rect.height) * 2 + 1
    );
    raycaster.setFromCamera(ndc, camera);
    const hits = raycaster.intersectObject(pivot, true);
    if(hits.length > 0){
      canClickBadge = false;
      if(badge.sound){
        const audio = playBadgeSound(badge.sound);
        if(audio){
          const release = () => { canClickBadge = true; };
          audio.addEventListener('ended', release, { once:true });
          audio.addEventListener('error', release, { once:true });
          setTimeout(release, CLICK_COOLDOWN_SAFETY);
        }else{
          setTimeout(() => { canClickBadge = true; }, CLICK_COOLDOWN_FALLBACK);
        }
      }else{
        setTimeout(() => { canClickBadge = true; }, CLICK_COOLDOWN_FALLBACK);
      }
      clipActions.forEach((action) => { action.reset(); action.play(); });
      drop.vel += CLICK_BOUNCE_KICK; // 착지 스프링을 그대로 재활용해 "뽀용" 튕기게 함
    }
  }

  const el = renderer.domElement;
  function onDown(e){
    state.dragging = true; state.lastX = e.clientX; state.lastY = e.clientY;
    state.velX = 0; state.velY = 0;
    clickStart = { x:e.clientX, y:e.clientY, time:performance.now() };
  }
  function onMove(e){
    if(!state.dragging) return;
    const dx = e.clientX - state.lastX, dy = e.clientY - state.lastY;
    const deltaY = dx * 0.01, deltaX = dy * 0.01;
    state.rotY += deltaY;
    state.rotX += deltaX;
    state.rotX = Math.max(-1.1, Math.min(1.1, state.rotX));
    state.velY = deltaY;
    state.velX = deltaX;
    state.lastX = e.clientX; state.lastY = e.clientY;
  }
  function onUp(e){
    state.dragging = false;
    if(clickStart){
      const dist = Math.hypot(e.clientX - clickStart.x, e.clientY - clickStart.y);
      const heldFor = performance.now() - clickStart.time;
      if(dist < 6 && heldFor < 500) handleBadgeClick(e);
      clickStart = null;
    }
  }

  el.addEventListener('pointerdown', onDown);
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);

  function onResize(){
    const w = mount.clientWidth, h = mount.clientHeight;
    renderer.setSize(w,h);
    camera.aspect = w/h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', onResize);

  threeCleanup = () => {
    cancelAnimationFrame(raf);
    el.removeEventListener('pointerdown', onDown);
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
    window.removeEventListener('resize', onResize);
    disposables.forEach(d => d.dispose && d.dispose());
    renderer.dispose();
  };
}

/* 시작 화면 */
showLogin();
</script>
