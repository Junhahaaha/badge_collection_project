<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>나의 뱃지 도감</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<style>
  :root{
    --gold:#D9B26C; --parchment:#F6EFDD;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:'Noto Sans KR', sans-serif;
    background:#FFFFFF;
    color:#262035;
    min-height:100vh;
    overflow-x:hidden;
  }
  #app{ position:relative; min-height:100vh; }

  /* 로그인 화면 */
  .login-screen{
    position:relative; min-height:100vh; display:flex;
    align-items:center; justify-content:center;
    background:#FFFFFF;
    padding:24px;
  }
  .login-card{
    position:relative; z-index:1; width:100%; max-width:380px;
    background:linear-gradient(180deg, var(--parchment), #EFE4C8);
    color:#262035; border-radius:18px; padding:40px 32px 32px; text-align:center;
    box-shadow:0 30px 60px rgba(0,0,0,.18), 0 0 0 1px rgba(217,178,108,.35);
  }
  .login-title{ font-family:'Pretendard', 'Noto Sans KR', sans-serif; font-size:26px; font-weight:700; margin:0 0 10px; }
  .login-desc{ font-size:13px; color:#5B5470; margin:0 0 26px; line-height:1.6; }
  .login-form{ display:flex; flex-direction:column; gap:10px; }
  .login-input{
    font-family:'Noto Sans KR', sans-serif; padding:13px 16px; border-radius:10px;
    border:1.5px solid #D8CBA5; background:#FFFDF6; font-size:14px; outline:none;
    transition:border-color .15s ease;
  }
  .login-input:focus{ border-color:#A98A45; }
  .login-btn{
    font-family:'Noto Sans KR', sans-serif; padding:13px 16px; border-radius:10px; border:none;
    background:#262035; color:var(--parchment); font-weight:700; font-size:14px; cursor:pointer;
    transition:transform .15s ease, background .15s ease;
  }
  .login-btn:hover{ background:#3A3155; transform:translateY(-1px); }
  .login-error{ margin:14px 0 0; font-size:12.5px; color:#B44444; font-weight:500; min-height:16px; }
  .login-note{ margin:20px 0 0; font-size:11px; color:#9C916E; }

  /* 컬렉션 화면 */
  .collection-screen{
    position:relative; min-height:100vh; padding:40px 6vw 80px; display:none;
    background:#FFFFFF; color:#262035;
  }
  .collection-header{
    position:relative; z-index:1; display:flex; align-items:flex-end; justify-content:flex-end;
    flex-wrap:wrap; gap:16px; margin-bottom:44px; border-bottom:1px solid rgba(217,178,108,.3); padding-bottom:20px;
  }
  .back-link{
    background:transparent; border:1px solid rgba(38,32,53,.25); color:#262035;
    font-family:'Noto Sans KR', sans-serif; font-size:12.5px; padding:9px 16px; border-radius:999px; cursor:pointer;
    transition:background .15s ease, border-color .15s ease;
  }
  .back-link:hover{ background:rgba(38,32,53,.06); border-color:rgba(38,32,53,.45); }
  .collection-body{ position:relative; z-index:1; }

  .empty-state{ text-align:center; padding:90px 20px; color:#6B6480; }
  .empty-mark{ font-size:30px; color:var(--gold); margin-bottom:14px; }
  .empty-text{ font-size:16px; font-weight:500; margin:0 0 8px; color:#262035; }
  .empty-sub{ font-size:13px; color:#847DA0; margin:0; }

  .badge-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(190px,1fr)); gap:32px; max-width:1000px; }
  .badge-cell{
    position:relative; display:flex; flex-direction:column; align-items:center; cursor:pointer;
    animation:floatIn .6s ease both; width:max-content; justify-self:center;
  }
  @keyframes floatIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  .badge-medal{
    position:relative; width:160px; height:160px;
    display:flex; align-items:center; justify-content:center;
    transition:transform .2s ease;
    isolation:isolate; overflow:hidden;
  }
  .badge-medal.placeholder{
    border-radius:50%;
    box-shadow:0 10px 24px rgba(0,0,0,.4), inset 0 0 0 2px rgba(255,255,255,.18);
  }
  .badge-cell:hover .badge-medal{ transform:translateY(-4px); }
  .badge-img{ width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 8px 16px rgba(0,0,0,.4)); }
  .badge-fallback{ font-size:28px; font-weight:700; color:rgba(255,255,255,.85); }
  /* sparkleMap: 흰색(스와이프 반짝임이 적용되는 부분) / 검정(적용 안 되는 부분)을 나타내는 마스크 이미지.
     이 mask로 잘라낸 영역 안에서만 대각선 빛줄기가 스와이프되며 지나갑니다. */
  .badge-sparkle-mask{
    position:absolute; inset:0; width:100%; height:100%; overflow:hidden; pointer-events:none;
    mask-repeat:no-repeat; mask-position:center; mask-size:contain; mask-mode:luminance;
    -webkit-mask-repeat:no-repeat; -webkit-mask-position:center; -webkit-mask-size:contain;
  }
  .badge-sparkle-mask::before{
    content:''; position:absolute; top:-50%; left:-60%; width:40%; height:200%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,.9), transparent);
    transform:rotate(20deg); animation:badgeSweep 3.6s ease-in-out infinite;
  }
  .badge-sparkle-mask.s2::before{ animation-delay:1.8s; }
  @keyframes badgeSweep{
    0%{ left:-60%; opacity:0; }
    8%{ opacity:.95; }
    22%{ left:130%; opacity:0; }
    100%{ left:130%; opacity:0; }
  }

  .tooltip{
    position:absolute; bottom:100%; right:-10px; margin-bottom:10px;
    background:#0B0E1F; color:#FFFFFF; padding:12px 16px; border-radius:22px;
    min-width:160px; max-width:220px; text-align:left; z-index:5;
    box-shadow:0 12px 24px rgba(0,0,0,.4); pointer-events:none;
    opacity:0; visibility:hidden; transform:scale(.4); transform-origin:bottom right;
  }
  .tooltip.visible{
    visibility:visible;
    animation:tooltipPop .4s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes tooltipPop{
    0%{ opacity:0; transform:scale(.3) translateY(6px); }
    55%{ opacity:1; transform:scale(1.08) translateY(-3px); }
    100%{ opacity:1; transform:scale(1) translateY(0); }
  }
  .tooltip-main{ font-weight:700; font-size:13.5px; margin:0 0 4px; }
  .tooltip-sub{ font-weight:300; font-size:11.5px; line-height:1.5; margin:0; color:#D8D8E4; }
  .tooltip-tail{
    position:absolute; bottom:-6px; left:24px;
    transform:rotate(45deg); border-radius:3px;
    width:12px; height:12px; background:#0B0E1F;
  }

  /* 3D 뷰어 오버레이 */
  .viewer-overlay{
    position:fixed; inset:0; z-index:50; background:rgba(6,8,20,.78);
    backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center;
    animation:fadeIn .2s ease;
  }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .close-btn{
    position:absolute; top:24px; left:24px; width:42px; height:42px; border-radius:50%;
    border:1px solid rgba(245,243,236,.35); background:rgba(255,255,255,.06); color:#F5F3EC;
    font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background .15s ease, transform .15s ease;
  }
  .close-btn:hover{ background:rgba(255,255,255,.16); transform:scale(1.06); }
  .viewer-panel{
    width:min(420px, 88vw); background:linear-gradient(180deg, #191F3D, #12162E); border-radius:20px;
    padding:24px; box-shadow:0 30px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(217,178,108,.2); text-align:center;
  }
  .viewer-canvas{ width:100%; height:min(320px, 60vw); touch-action:none; cursor:grab; }
  .viewer-canvas:active{ cursor:grabbing; }
  .viewer-caption{ margin-top:12px; }
  .viewer-name{ font-weight:700; font-size:16px; margin:0 0 6px; color:#F5F3EC; }
  .viewer-desc{ font-weight:300; font-size:12.5px; color:#C9C3DA; margin:0 0 10px; line-height:1.5; }
</style>
</head>
<body>
<div id="app">

  <!-- 로그인 화면 -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1 class="login-title">나의 뱃지 도감</h1>
      <p class="login-desc">이름을 입력하면 그동안 모은 뱃지를 볼 수 있어요.</p>
      <form class="login-form" id="loginForm">
        <input type="text" class="login-input" id="nameInput" placeholder="이름을 입력하세요" />
        <button type="submit" class="login-btn">도감 열기</button>
      </form>
      <p class="login-error" id="loginError"></p>
      <p class="login-note">테스트용 등록 이름: 김민준 · 이서연 · 박도윤</p>
    </div>
  </div>

  <!-- 컬렉션 화면 -->
  <div class="collection-screen" id="collectionScreen">
    <header class="collection-header">
      <button class="back-link" id="backBtn">로그인 창으로</button>
    </header>
    <main class="collection-body">
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-mark">✦</div>
        <p class="empty-text">아직 아무런 뱃지도 모으지 못했어요.</p>
        <p class="empty-sub">스터디에 참여하면 새로운 뱃지가 도감에 나타나요.</p>
      </div>
      <div class="badge-grid" id="badgeGrid"></div>
    </main>
  </div>

  <!-- 3D 뷰어 오버레이 -->
  <div class="viewer-overlay" id="viewerOverlay">
    <button class="close-btn" id="closeViewerBtn" aria-label="닫기">✕</button>
    <div class="viewer-panel">
      <div class="viewer-canvas" id="viewerCanvas"></div>
      <div class="viewer-caption">
        <p class="viewer-name" id="viewerName"></p>
        <p class="viewer-desc" id="viewerDesc"></p>
      </div>
    </div>
  </div>

</div>

<script>
/* ----------------------------------------------------------------
   뱃지 카탈로그 + 유저별 보유 목록
   실제 서비스에서는 이 부분을 원하는 뱃지·이름으로 편집하면 됩니다.

   1) BADGE_CATALOG : 뱃지 하나의 "정의"를 id별로 한 번만 기입합니다.
        name / desc  : 말풍선에 표시될 이름과 설명
        colors       : [메인색, 보조색]
        shape        : 3D 자리표시자 모양 (cylinder/torus/icosahedron/octahedron),
                       modelUrl이 없거나 로드에 실패했을 때 사용됩니다.
        image        : 실제 2D 썸네일 이미지 URL (없으면 도형 자리표시자)
        sparkleMap1  : 스와이프 반짝임 적용 영역 마스크(흰색=적용/검정=비적용) URL 1
        sparkleMap2  : 스와이프 반짝임 적용 영역 마스크(흰색=적용/검정=비적용) URL 2
        modelUrl     : 실제 .glb 3D 모델 URL (없으면 도형 자리표시자)

   2) REGISTERED_USERS : 유저 이름 -> 보유한 뱃지 id 배열.
      뱃지 내용을 바꾸고 싶으면 BADGE_CATALOG만 수정하면 되고,
      유저에게 뱃지를 주고 싶으면 여기에 id만 추가하면 됩니다.
------------------------------------------------------------------- */
const BADGE_CATALOG = {
  b5: {
    name:"시작이 반!",
    desc:"스터디를 시작한 당신! 앞으로 디자인 고수가 될 날만 남았다!",
    colors:["#D9B26C","#F4E3B2"],
    shape:"cylinder",
    image:"assets/images/001-starter.png",
    sparkleMap1:"assets/sparkle-maps/001-starter-sparkle-1.png",
    sparkleMap2:"assets/sparkle-maps/001-starter-sparkle-2.png",
    modelUrl:"assets/models/001-starter.glb"
  }
};

const REGISTERED_USERS = {
  "김민준": ["b5"],
  "이서연": [],
  "박도윤": []
};

function getUserBadges(name){
  const ids = REGISTERED_USERS[name] || [];
  return ids
    .map(id => BADGE_CATALOG[id] ? Object.assign({ id }, BADGE_CATALOG[id]) : null)
    .filter(Boolean);
}

const SHAPE_LABEL = { cylinder:"메", icosahedron:"보", octahedron:"각", torus:"고" };

/* ---------------- 화면 전환 ---------------- */
const loginScreen = document.getElementById('loginScreen');
const collectionScreen = document.getElementById('collectionScreen');
const loginForm = document.getElementById('loginForm');
const nameInput = document.getElementById('nameInput');
const loginError = document.getElementById('loginError');
const badgeGrid = document.getElementById('badgeGrid');
const emptyState = document.getElementById('emptyState');
const backBtn = document.getElementById('backBtn');

function showCollection(name){
  const badges = getUserBadges(name);
  badgeGrid.innerHTML = '';
  if(badges.length === 0){
    emptyState.style.display = 'block';
    badgeGrid.style.display = 'none';
  }else{
    emptyState.style.display = 'none';
    badgeGrid.style.display = 'grid';
    badges.forEach((b, i) => badgeGrid.appendChild(renderBadgeCell(b, i)));
  }
  loginScreen.style.display = 'none';
  collectionScreen.style.display = 'block';
}

function showLogin(){
  collectionScreen.style.display = 'none';
  loginScreen.style.display = 'flex';
  nameInput.value = '';
  loginError.textContent = '';
  nameInput.focus();
}

loginForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const trimmed = nameInput.value.trim();
  if(!trimmed){
    loginError.textContent = '이름을 입력해 주세요.';
    return;
  }
  if(!(trimmed in REGISTERED_USERS)){
    loginError.textContent = '등록되지 않은 이름이에요. 스터디장에게 등록을 요청해 주세요.';
    return;
  }
  loginError.textContent = '';
  showCollection(trimmed);
});

backBtn.addEventListener('click', showLogin);

/* ---------------- 뱃지 셀 렌더링 ---------------- */
function renderBadgeCell(badge, index){
  const cell = document.createElement('div');
  cell.className = 'badge-cell';
  cell.style.animationDelay = ((index % 6) * 0.35) + 's';

  const medal = document.createElement('div');

  if(badge.image){
    medal.className = 'badge-medal';
    const img = document.createElement('img');
    img.src = badge.image; img.alt = badge.name; img.className = 'badge-img';
    medal.appendChild(img);

    [badge.sparkleMap1, badge.sparkleMap2].forEach((url, i) => {
      if(!url) return;
      const sparkle = document.createElement('div');
      sparkle.className = `badge-sparkle-mask s${i + 1}`;
      sparkle.style.maskImage = `url("${url}")`;
      sparkle.style.webkitMaskImage = `url("${url}")`;
      medal.appendChild(sparkle);
    });
  }else{
    medal.className = 'badge-medal placeholder';
    medal.style.background = `linear-gradient(155deg, ${badge.colors[0]}, ${badge.colors[1]})`;
    const span = document.createElement('span');
    span.className = 'badge-fallback';
    span.textContent = SHAPE_LABEL[badge.shape] || '★';
    medal.appendChild(span);
  }
  cell.appendChild(medal);

  const tooltip = document.createElement('div');
  tooltip.className = 'tooltip';
  tooltip.innerHTML = `
    <p class="tooltip-main">${escapeHtml(badge.name)}</p>
    <p class="tooltip-sub">${escapeHtml(badge.desc)}</p>
    <span class="tooltip-tail"></span>
  `;
  cell.appendChild(tooltip);

  cell.addEventListener('mouseenter', () => {
    tooltip.classList.remove('visible');
    void tooltip.offsetWidth; // 재진입 시 팝 애니메이션이 다시 재생되도록 강제 리플로우
    tooltip.classList.add('visible');
  });
  cell.addEventListener('mouseleave', () => { tooltip.classList.remove('visible'); });
  cell.addEventListener('click', () => openViewer(badge));

  return cell;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ---------------- 3D 뷰어 ---------------- */
const viewerOverlay = document.getElementById('viewerOverlay');
const viewerCanvasHost = document.getElementById('viewerCanvas');
const viewerName = document.getElementById('viewerName');
const viewerDesc = document.getElementById('viewerDesc');
const closeViewerBtn = document.getElementById('closeViewerBtn');

let threeCleanup = null;

function openViewer(badge){
  viewerName.textContent = badge.name;
  viewerDesc.textContent = badge.desc;
  viewerOverlay.style.display = 'flex';
  mountThree(badge);
}

function closeViewer(){
  viewerOverlay.style.display = 'none';
  if(threeCleanup){ threeCleanup(); threeCleanup = null; }
  viewerCanvasHost.innerHTML = '';
}
closeViewerBtn.addEventListener('click', closeViewer);
viewerOverlay.addEventListener('click', (e) => { if(e.target === viewerOverlay) closeViewer(); });
document.addEventListener('keydown', (e) => { if(e.key === 'Escape' && viewerOverlay.style.display === 'flex') closeViewer(); });

function mountThree(badge){
  const mount = viewerCanvasHost;
  const width = mount.clientWidth || 320;
  const height = mount.clientHeight || 320;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(40, width/height, 0.1, 100);
  camera.position.set(0,0,4.2);

  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputEncoding = THREE.sRGBEncoding;
  mount.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 1.1));
  const key = new THREE.DirectionalLight(0xffffff, 1.2);
  key.position.set(2,3,4); scene.add(key);
  const fill = new THREE.DirectionalLight(0xffffff, 0.7);
  fill.position.set(-3,-1,3); scene.add(fill);
  const rimLight = new THREE.DirectionalLight(0xffffff, 0.5);
  rimLight.position.set(0,2,-4); scene.add(rimLight);
  const glowLight = new THREE.PointLight(badge.colors[0], 1.4, 10);
  glowLight.position.set(-2,1,2); scene.add(glowLight);

  // 실제 모델이든 자리표시자 도형이든 이 pivot을 회전시켜 조작합니다.
  const pivot = new THREE.Group();
  scene.add(pivot);
  const disposables = [];

  function buildPlaceholder(){
    let geometry;
    switch(badge.shape){
      case 'torus': geometry = new THREE.TorusGeometry(0.85, 0.32, 24, 80); break;
      case 'icosahedron': geometry = new THREE.IcosahedronGeometry(1.05, 0); break;
      case 'octahedron': geometry = new THREE.OctahedronGeometry(1.1, 0); break;
      default: geometry = new THREE.CylinderGeometry(1,1,0.28,48);
    }
    const material = new THREE.MeshStandardMaterial({
      color: badge.colors[0], metalness:0.75, roughness:0.22,
      emissive: new THREE.Color(badge.colors[0]), emissiveIntensity:0.12
    });
    const mesh = new THREE.Mesh(geometry, material);
    pivot.add(mesh);
    disposables.push(geometry, material);

    if(badge.shape === 'cylinder'){
      const rimGeo = new THREE.TorusGeometry(1.02, 0.05, 16, 64);
      const rimMat = new THREE.MeshStandardMaterial({ color: badge.colors[1], metalness:0.8, roughness:0.15 });
      const rim = new THREE.Mesh(rimGeo, rimMat);
      rim.rotation.x = Math.PI/2;
      pivot.add(rim);
      disposables.push(rimGeo, rimMat);
    }
  }

  if(badge.modelUrl){
    const loader = new THREE.GLTFLoader();
    loader.load(
      badge.modelUrl,
      (gltf) => {
        const modelRoot = gltf.scene;
        // 모델 크기가 제각각이어도 뷰어 안에 일정하게 들어오도록 정규화합니다.
        const box = new THREE.Box3().setFromObject(modelRoot);
        const size = new THREE.Vector3(); box.getSize(size);
        const center = new THREE.Vector3(); box.getCenter(center);
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const scale = 1.8 / maxDim;
        modelRoot.scale.setScalar(scale);
        modelRoot.position.sub(center.multiplyScalar(scale));
        pivot.add(modelRoot);
      },
      undefined,
      (err) => {
        console.error('glb 모델 로드 실패, 자리표시자 도형으로 대체합니다.', err);
        buildPlaceholder();
      }
    );
  } else {
    buildPlaceholder();
  }

  const state = { dragging:false, lastX:0, lastY:0, rotX:0.35, rotY:0.6 };
  let raf;

  function render(){
    pivot.rotation.y = state.rotY;
    pivot.rotation.x = state.rotX;
    renderer.render(scene, camera);
    raf = requestAnimationFrame(render);
  }
  render();

  const el = renderer.domElement;
  function onDown(e){ state.dragging = true; state.lastX = e.clientX; state.lastY = e.clientY; }
  function onMove(e){
    if(!state.dragging) return;
    const dx = e.clientX - state.lastX, dy = e.clientY - state.lastY;
    state.rotY += dx * 0.01;
    state.rotX += dy * 0.01;
    state.rotX = Math.max(-1.1, Math.min(1.1, state.rotX));
    state.lastX = e.clientX; state.lastY = e.clientY;
  }
  function onUp(){ state.dragging = false; }

  el.addEventListener('pointerdown', onDown);
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);

  function onResize(){
    const w = mount.clientWidth, h = mount.clientHeight;
    renderer.setSize(w,h);
    camera.aspect = w/h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', onResize);

  threeCleanup = () => {
    cancelAnimationFrame(raf);
    el.removeEventListener('pointerdown', onDown);
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
    window.removeEventListener('resize', onResize);
    disposables.forEach(d => d.dispose && d.dispose());
    renderer.dispose();
  };
}

/* 시작 화면 */
showLogin();
</script>
